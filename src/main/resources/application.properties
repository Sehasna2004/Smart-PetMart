# ==============================================================
# 1. Database Connection Settings
# ==============================================================
# Connection to the Smart_PetMart database
spring.datasource.url=jdbc:mysql://localhost:3306/Smart_PetMart?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================================================
# 2. JPA & Hibernate Properties
# ==============================================================
# 'update' automatically syncs your Pet.java model with the MySQL table
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ==============================================================
# 3. File Upload Settings (CRITICAL for PawMart Images)
# ==============================================================
# This ensures Spring Boot doesn't block large pet photos
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ==============================================================
# 4. Java 21 Performance Optimization
# ==============================================================
# Virtual Threads allow your backend to handle high traffic efficiently
spring.threads.virtual.enabled=true

# ==============================================================
# 5. Server Configuration
# ==============================================================
server.port=8080