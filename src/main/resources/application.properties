# 1. Database Connection Settings
# Added allowPublicKeyRetrieval=true to fix the handshake error
spring.datasource.url=jdbc:mysql://localhost:3306/Smart_PetMart?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
# Remember to change 'your_mysql_password' to your actual MySQL password!
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. JPA & Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 3. Java 21 Performance Optimization
# Virtual Threads help PawMart handle many pet seekers at once!
spring.threads.virtual.enabled=true

# 4. Server Port
server.port=8080